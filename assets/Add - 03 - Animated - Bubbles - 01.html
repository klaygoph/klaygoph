<div class="klaygo-bubbles">

  <span class="bubble bubble-1"></span>
  <span class="bubble bubble-2"></span>
  <span class="bubble bubble-3"></span>
  <span class="bubble bubble-4"></span>
  <span class="bubble bubble-5"></span>

</div>

<style>

.klaygo-bubbles{
  position:absolute;
  inset:0;

  overflow:hidden;
  pointer-events:none;
}

/* SHARED */

.bubble{
  position:absolute;

  border-radius:50%;

  backdrop-filter: blur(4px);

  border:
    1px solid rgba(168,191,224,.35);

  background:
    radial-gradient(
      circle at 30% 30%,
      rgba(247,249,252,.45),
      rgba(168,191,224,.12)
    );

  animation:
    floatBubble linear infinite;
}

/* INDIVIDUAL BUBBLES */

.bubble-1{
  width:90px;
  height:90px;

  left:10%;
  top:65%;

  animation-duration:18s;
}

.bubble-2{
  width:60px;
  height:60px;

  left:75%;
  top:75%;

  animation-duration:14s;
}

.bubble-3{
  width:120px;
  height:120px;

  left:70%;
  top:15%;

  animation-duration:22s;
}

.bubble-4{
  width:45px;
  height:45px;

  left:20%;
  top:20%;

  animation-duration:12s;
}

.bubble-5{
  width:75px;
  height:75px;

  left:45%;
  top:55%;

  animation-duration:16s;
}

/* ANIMATION */

@keyframes floatBubble{

  0%{
    transform:
      translateY(0px)
      translateX(0px);
  }

  25%{
    transform:
      translateY(-15px)
      translateX(8px);
  }

  50%{
    transform:
      translateY(-30px)
      translateX(-8px);
  }

  75%{
    transform:
      translateY(-15px)
      translateX(10px);
  }

  100%{
    transform:
      translateY(0px)
      translateX(0px);
  }

}

</style>
